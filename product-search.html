<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sovereign Industrial Product Search</title>
  <style>
    :root {
      --wp--preset--spacing--30: 1.5rem;
      --wp--preset--spacing--40: 2rem;
      --wp--preset--spacing--50: 3rem;
    }
    body { margin: 0; font-family: system-ui, sans-serif; background: #0d1117; color: #c9d1d9; }
    .alignfull { width: 100%; }
    .alignwide { max-width: 1200px; margin: 0 auto; padding: 0 1rem; }
    .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1.5rem; padding-top: var(--wp--preset--spacing--30); }
    .product-card { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 1rem; position: relative; }
    .product-image { width: 100%; aspect-ratio: 1; background: #21262d; border-radius: 4px; object-fit: cover; }
    .product-title { font-size: 1.2rem; margin: 1rem 0 0.5rem 0; color: #f0f6fc; }
    .product-price { font-weight: bold; color: #58a6ff; }
    .search-bar-container { margin: 1rem 0; display: flex; gap: 0.75rem; flex-wrap: wrap; }
    .search-input { padding: 0.5rem; width: min(70%, 420px); background: #010409; border: 1px solid #30363d; color: white; border-radius: 4px; }
    .search-btn { padding: 0.5rem 1rem; background: #238636; border: none; color: white; border-radius: 4px; cursor: pointer; }
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>
<body>

  <header class="alignfull" style="padding: 1rem; border-bottom: 1px solid #30363d;">
    <div class="alignwide">
      <a href="https://cortex-nexus-sovereign-industrial-ai.github.io/cortex-platform/" style="color: #58a6ff; text-decoration: none;">← Return to Home Platform</a>
    </div>
  </header>

  <main class="wp-block-group alignfull" style="padding-top: var(--wp--preset--spacing--40); padding-bottom: var(--wp--preset--spacing--50);">
    <div class="alignwide">
      <div class="breadcrumbs" id="platform-breadcrumbs">Home / Industrial Products</div>
      <h2 id="search-title">Search Results</h2>

      <div class="search-bar-container" role="search" aria-label="Product search">
        <label class="sr-only" for="product-query">Search products</label>
        <input type="search" id="product-query" class="search-input" placeholder="Search industrial assets, models, tokens...">
        <button id="search-trigger" class="search-btn">Search</button>
      </div>
    </div>

    <div class="alignwide">
      <div style="display: flex; justify-content: space-between; align-items: center; gap: 1rem; flex-wrap: wrap;">
        <span id="results-count">Showing 0 products</span>
        <select id="catalog-sorting" class="search-input" style="width: auto;">
          <option value="title-asc">Sort by Title (A-Z)</option>
          <option value="price-desc">Sort by Price (High to Low)</option>
        </select>
      </div>

      <div class="product-grid" id="sovereign-product-collection"></div>
    </div>
  </main>

  <script>
    const PlatformConfig = {
      sdkEndpoint: "/v1",
      ibmEndpoint: "https://us-south.functions.cloud.ibm.com/api/v1/web/"
    };

    document.getElementById('search-trigger').addEventListener('click', async () => {
      const query = document.getElementById('product-query').value.trim();
      document.getElementById('search-title').innerText = query ? `Search Results for: "${query}"` : "Search Results";

      try {
        const localDataPromise = fetch(`${PlatformConfig.sdkEndpoint}/search?q=${encodeURIComponent(query)}`).then(r => r.json()).catch(() => []);
        const ibmDataPromise = fetch(`${PlatformConfig.ibmEndpoint}?searchQuery=${encodeURIComponent(query)}`).then(r => r.json()).catch(() => []);

        const [localAssets, ibmAssets] = await Promise.all([localDataPromise, ibmDataPromise]);
        const combinedCollection = [...localAssets, ...ibmAssets];

        renderProductCollection(combinedCollection);
      } catch (err) {
        console.error("Pipeline Sync Error:", err);
        renderProductCollection([]);
      }
    });

    function renderProductCollection(items) {
      const container = document.getElementById('sovereign-product-collection');
      const countLabel = document.getElementById('results-count');
      container.innerHTML = '';
      countLabel.innerText = `Showing ${items.length} products found across unified layers`;

      if (items.length === 0) {
        container.innerHTML = `<p style="grid-column: 1/-1; text-align: center; color: #8b949e;">No industrial products matched your query.</p>`;
        return;
      }

      items.forEach(item => {
        const card = document.createElement('div');
        card.className = 'product-card';
        card.innerHTML = `
          <img class="product-image" src="${item.image || 'placeholder.png'}" alt="${item.title || 'Product'}">
          <h3 class="product-title">${item.title || 'Untitled Product'}</h3>
          <div class="product-price">${item.price || 'Sovereign Node Exchange'}</div>
        `;
        container.appendChild(card);
      });
    }
  </script>
</body>
</html>
