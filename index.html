<style>
:root{
  --navy:#001F5B;--navy-deep:#000D2E;--teal:#00C2FF;--teal-dim:#0099CC;
  --gold:#D4A017;--white:#FFFFFF;--off:#E8F4FF;--gray:#8899AA;
  --dark:#060D1F;--card:#0A1628;--card2:#0D1E35;
  --green:#00FF88;--purple:#7B2FBE;--red:#FF3355;
  --font-head:'Segoe UI',system-ui,sans-serif;
  --font-body:'Segoe UI',system-ui,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--dark);color:var(--white);font-family:var(--font-body);overflow-x:hidden;}

::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:var(--navy-deep);}
::-webkit-scrollbar-thumb{background:var(--teal);border-radius:3px;}

nav{position:fixed;top:0;left:0;right:0;z-index:1000;background:rgba(6,13,31,0.92);backdrop-filter:blur(16px);border-bottom:1px solid rgba(0,194,255,0.15);display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:64px;transition:all .3s;}
.nav-logo{display:flex;align-items:center;gap:.75rem;text-decoration:none;}
.nav-logo .mark{font-size:1.5rem;font-weight:900;color:var(--teal);letter-spacing:-.5px;}
.nav-logo .sub{font-size:.65rem;color:var(--gold);letter-spacing:2px;text-transform:uppercase;display:block;margin-top:-2px;}
.nav-links{display:flex;gap:1.5rem;list-style:none;}
.nav-links a{color:var(--gray);text-decoration:none;font-size:.82rem;letter-spacing:.5px;text-transform:uppercase;transition:color .2s;}
.nav-links a:hover{color:var(--teal);}
.nav-cta{background:var(--teal);color:var(--navy-deep);padding:.5rem 1.25rem;border-radius:6px;font-weight:700;font-size:.82rem;text-decoration:none;letter-spacing:.5px;transition:all .2s;}
.nav-cta:hover{background:var(--gold);color:#000;}
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:8px;}
.hamburger span{width:22px;height:2px;background:var(--teal);border-radius:2px;transition:all .3s;}
.mobile-menu{display:none;position:fixed;top:64px;left:0;right:0;background:rgba(6,13,31,.98);padding:2rem;z-index:999;border-bottom:1px solid rgba(0,194,255,.2);}
.mobile-menu.open{display:block;}
.mobile-menu a{display:block;color:var(--white);text-decoration:none;padding:.75rem 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:.95rem;}

#hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:6rem 2rem 4rem;position:relative;overflow:hidden;}
.hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(0,194,255,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(0,194,255,.05) 1px,transparent 1px);background-size:60px 60px;animation:gridMove 20s linear infinite;}
@keyframes gridMove{from{transform:translate(0,0)}to{transform:translate(60px,60px)}}
.hero-glow{position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(0,194,255,.12) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);animation:pulse 4s ease-in-out infinite;}
@keyframes pulse{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.1)}}
.hero-eyebrow{font-size:.72rem;letter-spacing:4px;color:var(--teal);text-transform:uppercase;margin-bottom:1.5rem;position:relative;}
.hero-title{font-size:clamp(2.8rem,7vw,6rem);font-weight:900;line-height:1.05;position:relative;background:linear-gradient(135deg,var(--white) 30%,var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.75rem;}
.hero-subtitle{font-size:clamp(1rem,2.5vw,1.4rem);color:var(--teal);font-weight:600;letter-spacing:2px;text-transform:uppercase;position:relative;margin-bottom:1.5rem;}
.hero-desc{max-width:640px;color:var(--gray);font-size:1.05rem;line-height:1.75;position:relative;margin-bottom:2.5rem;}
.hero-stats{display:flex;gap:3rem;justify-content:center;margin-bottom:3rem;position:relative;flex-wrap:wrap;}
.stat{text-align:center;}
.stat-n{font-size:2.2rem;font-weight:900;color:var(--teal);display:block;}
.stat-l{font-size:.72rem;letter-spacing:2px;color:var(--gray);text-transform:uppercase;}
.hero-btns{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center;position:relative;}
.btn-primary{background:linear-gradient(135deg,var(--teal),#0077AA);color:#000;padding:.85rem 2rem;border-radius:8px;font-weight:800;font-size:.9rem;letter-spacing:.5px;text-decoration:none;transition:all .3s;border:none;cursor:pointer;}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,194,255,.35);}
.btn-outline{border:1.5px solid var(--teal);color:var(--teal);padding:.85rem 2rem;border-radius:8px;font-weight:700;font-size:.9rem;letter-spacing:.5px;text-decoration:none;transition:all .3s;background:transparent;}

.scroll-arrow{width:20px;height:20px;border-right:2px solid var(--teal);border-bottom:2px solid var(--teal);transform:rotate(45deg);animation:bounce .8s ease-in-out infinite alternate;}

section{padding:6rem 2rem;}
.section-inner{max-width:1200px;margin:0 auto;}

.product-card{background:var(--card);border:1px solid rgba(0,194,255,.15);border-radius:20px;padding:2.5rem;display:flex;flex-direction:column;gap:1.25rem;position:relative;overflow:hidden;}
.product-card .badge{position:absolute;top:1.5rem;right:1.5rem;font-size:.65rem;letter-spacing:2px;text-transform:uppercase;padding:.3rem .7rem;border-radius:20px;font-weight:700;}
.badge-new{background:var(--green);color:#000;}
.badge-flagship{background:var(--gold);color:#000;}
.product-icon{font-size:3rem;margin-bottom:.5rem;}
.product-card h3{font-size:1.4rem;font-weight:800;}
.product-card p{color:var(--gray);font-size:.9rem;line-height:1.7;}
.feature-list{list-style:none;display:flex;flex-direction:column;gap:.5rem;margin-top:.5rem;}
.feature-list li{font-size:.85rem;color:var(--gray);display:flex;align-items:flex-start;gap:.6rem;}
.feature-list li::before{content:'◆';color:var(--teal);font-size:.5rem;margin-top:.35rem;flex-shrink:0;}
.product-btn{margin-top:auto;background:transparent;border:1.5px solid var(--teal);color:var(--teal);padding:.65rem 1.25rem;border-radius:8px;font-weight:700;font-size:.82rem;cursor:pointer;transition:all .25s;text-align:center;text-decoration:none;display:block;}

.voice-grid{display:grid;grid-template-columns:1fr 1fr;gap:3rem;align-items:center;}

#security{background:linear-gradient(180deg,#040A18,var(--dark));}

.threat-dot.blocked{background:var(--red);animation-delay:1s;}

.threat-label{font-size:.82rem;color:var(--gray);flex:1;}
.threat-status{font-size:.72rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;}
.status-ok{color:var(--green);}
.status-watch{color:var(--gold);}
.status-block{color:var(--red);}

#analytics{background:#040A18;}
.metric-bar{margin-bottom:1.25rem;}
.metric-bar .mb-label{display:flex;justify-content:space-between;margin-bottom:.4rem;font-size:.8rem;color:var(--gray);}
.metric-bar .mb-label span:last-child{color:var(--teal);font-weight:700;}
.mb-track{height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;}
.mb-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--teal),#0099CC);animation:fillUp 1.5s ease-out forwards;transform-origin:left;}
@keyframes fillUp{from{width:0}to{width:var(--w)}}

.roi-card{background:linear-gradient(135deg,rgba(0,194,255,.06),rgba(212,160,23,.04));border:1px solid rgba(0,194,255,.18);border-radius:20px;padding:2.5rem;text-align:center;}

#education{background:linear-gradient(180deg,var(--dark),#040A18);}
.edu-track{background:var(--card);border:1px solid rgba(0,194,255,.12);border-radius:16px;padding:1.75rem;display:flex;gap:1.25rem;align-items:flex-start;margin-bottom:1rem;}
.edu-num{width:36px;height:36px;border-radius:50%;background:rgba(0,194,255,.12);border:1px solid rgba(0,194,255,.3);display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:900;color:var(--teal);flex-shrink:0;}
.edu-content h4{font-size:.95rem;font-weight:700;margin-bottom:.35rem;}

.blog-card{background:var(--card);border:1px solid rgba(0,194,255,.1);border-radius:16px;overflow:hidden;transition:all .3s;}

.blog-body .blog-cat{font-size:.65rem;letter-spacing:2px;text-transform:uppercase;color:var(--teal);margin-bottom:.5rem;}

.blog-body p{font-size:.83rem;color:var(--gray);line-height:1.65;margin-bottom:1rem;}
.blog-body .read-more{font-size:.8rem;color:var(--teal);font-weight:700;text-decoration:none;letter-spacing:.5px;}

#scaling{background:var(--dark);}
.scale-pillar{background:linear-gradient(160deg,var(--card),var(--card2));border:1px solid rgba(0,194,255,.12);border-radius:16px;padding:2rem;border-left:3px solid var(--teal);}
.scale-pillar h3{font-size:1rem;font-weight:700;margin-bottom:.5rem;}
.scale-pillar p{font-size:.83rem;color:var(--gray);line-height:1.65;}
.scale-pillar .scale-num{font-size:2rem;font-weight:900;color:var(--teal);display:block;margin-bottom:.25rem;}

#directory{background:#040A18;}
.dir-category{background:var(--card);border:1px solid rgba(0,194,255,.12);border-radius:14px;padding:1.5rem;text-align:center;transition:all .3s;cursor:pointer;}

.dir-icon{font-size:2.2rem;margin-bottom:.75rem;}

.dir-category p{font-size:.75rem;color:var(--gray);}
.dir-count{font-size:1.5rem;font-weight:900;color:var(--teal);display:block;margin-top:.5rem;}

#subscribe{background:linear-gradient(180deg,#040A18,var(--dark));}

.plan-card .plan-badge{position:absolute;top:-12px;left:50%;transform:translateX(-50%);background:var(--teal);color:#000;font-size:.65rem;font-weight:800;letter-spacing:2px;padding:.3rem .9rem;border-radius:20px;text-transform:uppercase;white-space:nowrap;}
.plan-name{font-size:.75rem;letter-spacing:3px;text-transform:uppercase;color:var(--gray);margin-bottom:.75rem;}

.pay-btn-outline{background:transparent;border:1.5px solid var(--teal);color:var(--teal);}

.contact-info{display:flex;flex-direction:column;gap:1.5rem;}
.contact-item{display:flex;gap:1rem;align-items:flex-start;}
