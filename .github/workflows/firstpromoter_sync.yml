name: FirstPromoter Postback Synchronization

on:
  repository_dispatch:
    types: [firstpromoter_referral]

jobs:
  sync_referral:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout platform repository code
        uses: actions/checkout@v4

      - name: Initialize Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Execute Core Tracking Logic
        run: python scripts/process_referral.py
        
